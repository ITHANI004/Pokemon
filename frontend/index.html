<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex Database</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Pokédex Database</h1>
        <p>A beautiful, dynamic index of Pokémon</p>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by name, type, or ID...">
        </div>
        <div id="type-filters" class="type-filters">
            <!-- Filter buttons injected via JS -->
        </div>
      </header>
      
      <main id="pokemon-grid" class="pokemon-grid">
        <!-- Pokémon cards will be injected here via JS -->
      </main>
      
      <div id="loading" class="loading">Loading Pokémon Database...</div>
    </div>

    <!-- Modal for Pokemon Details -->
    <div id="pokeModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modal-body">
            <!-- Content injected via JS -->
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
