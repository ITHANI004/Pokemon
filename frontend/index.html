<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pokeball.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex Database</title>
  <!-- Google Fonts for modern typography -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div id="app">
    <div id="pokedexView">
      <header>
        <h1>Pokédex Database</h1>
        <p>A beautiful, dynamic index of Pokémon</p>
        <div class="search-container">
          <form class="primary-search-row" id="searchForm">
            <div class="search-input-wrapper">
              <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="search" id="searchInput" placeholder="Search by name or ID (Press '/' or Ctrl+K)..."
                autocomplete="off">
            </div>
            <button type="button" id="randomPokeBtn" class="random-btn" title="Discover a Random Pokémon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 3 21 3 21 8"></polyline>
                <line x1="4" y1="20" x2="21" y2="3"></line>
                <polyline points="21 16 21 21 16 21"></polyline>
                <line x1="15" y1="15" x2="21" y2="21"></line>
                <line x1="4" y1="4" x2="9" y2="9"></line>
              </svg>
              <span>Surprise Me!</span>
            </button>
            <button type="button" id="toggleFiltersBtn" class="toggle-filters-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
              </svg>
              <span>Filters</span>
            </button>
          </form>

          <div class="secondary-controls-row">
            <div class="control-group-left">
              <span class="control-label">Sort By:</span>
              <select id="sortSelect" class="sort-select" aria-label="Sort Pokémon">
                <option value="id-asc">ID (#)</option>
                <option value="name-asc">Name (A - Z)</option>
                <option value="weight-desc">Heaviest First</option>
                <option value="height-desc">Tallest First</option>
                <option value="speed-desc">Fastest First</option>
                <option value="attack-desc">Highest Attack</option>
              </select>
            </div>

            <div class="control-divider"></div>

            <div class="control-group-right">
              <button type="button" id="toggleFormsBtn" class="forms-toggle-pill">
                <span class="status-dot" id="formsStatusDot"></span>
                <span id="formsToggleText">Base Pokémon Only</span>
              </button>
            </div>
          </div>
        </div>

        <div id="advancedFilters" class="advanced-filters collapsed">
          <div class="filter-group">
            <h3>Types</h3>
            <div id="type-filters" class="filter-chips"></div>
          </div>

          <div class="filter-group">
            <h3>Generation</h3>
            <div id="gen-filters" class="filter-chips">
              <button class="filter-btn gen-btn" data-gen="1">Gen 1</button>
              <button class="filter-btn gen-btn" data-gen="2">Gen 2</button>
              <button class="filter-btn gen-btn" data-gen="3">Gen 3</button>
              <button class="filter-btn gen-btn" data-gen="4">Gen 4</button>
              <button class="filter-btn gen-btn" data-gen="5">Gen 5</button>
              <button class="filter-btn gen-btn" data-gen="6">Gen 6</button>
              <button class="filter-btn gen-btn" data-gen="7">Gen 7</button>
              <button class="filter-btn gen-btn" data-gen="8">Gen 8</button>
              <button class="filter-btn gen-btn" data-gen="9">Gen 9</button>
            </div>
          </div>

          <div class="filter-group row-group">
            <label class="custom-toggle">
              <input type="checkbox" id="legendaryToggle">
              <span class="toggle-slider"></span>
              Legendary
            </label>
            <label class="custom-toggle">
              <input type="checkbox" id="mythicalToggle">
              <span class="toggle-slider"></span>
              Mythical
            </label>
            <label class="custom-toggle">
              <input type="checkbox" id="megaToggle">
              <span class="toggle-slider"></span>
              Mega
            </label>
            <label class="custom-toggle">
              <input type="checkbox" id="regionalToggle">
              <span class="toggle-slider"></span>
              Regional
            </label>
          </div>
        </div>
      </header>

      <main id="pokemon-grid" class="pokemon-grid">
        <!-- Pokémon cards will be injected here via JS -->
      </main>

      <div id="loading" class="loading">Loading Pokémon Database...</div>

      <!-- Pagination Controls -->
      <div id="paginationContainer" class="pagination-container" style="display: none;">
        <button id="prevPageBtn" class="page-btn disabled">Previous</button>
        <div class="page-info">
          <span id="pageIndicator">Page 1 of 1</span>
        </div>
        <button id="nextPageBtn" class="page-btn">Next</button>
      </div>
    </div><!-- End pokedexView -->

    <!-- Dedicated Detail Page View -->
    <div id="detailView" class="detail-view" style="display: none;"></div>
  </div>

  <!-- Floating Back to Top Button -->
  <button id="backToTopBtn" class="back-to-top" title="Go to top" aria-label="Back to top">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- Modal for Pokemon Details -->
  <div id="pokeModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <div id="modal-body">
        <!-- Content injected via JS -->
      </div>
    </div>
  </div>

  <!-- Compare Banner -->
  <div id="compareBanner" class="compare-banner" style="display: none;">
    <span>Select another Pokémon to compare with <strong id="compareTargetName"></strong></span>
    <button id="cancelCompareBtn" class="cancel-compare-btn">Cancel</button>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
